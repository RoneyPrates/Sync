<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordens de Compras</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .orders-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .order-item {
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 250px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 10px;
            text-align: center;
            color: #fff; /* Texto branco para melhor contraste com as cores de fundo */
        }
        .order-item h2 {
            font-size: 18px;
            margin: 0;
        }
        .order-item p {
            font-size: 14px;
            margin: 5px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Ordens de Compras</h1>
    <div class="orders-grid">
        <!-- Ordem items will be generated by JavaScript -->
    </div>
</div>

<script>
    // Array de cores
    const colors = ['#28a745', '#ffc107', '#dc3545']; // Verde, Amarelo, Vermelho

    // Função para gerar uma cor aleatória
    function getRandomColor() {
        return colors[Math.floor(Math.random() * colors.length)];
    }

    // Criação de ordens de compras
    const orders = [
        { number: '001', date: '2024-08-28', value: 'R$ 120,00' },
        { number: '002', date: '2024-08-27', value: 'R$ 250,00' },
        { number: '003', date: '2024-08-26', value: 'R$ 80,00' },
        { number: '004', date: '2024-08-25', value: 'R$ 200,00' },
        { number: '005', date: '2024-08-24', value: 'R$ 150,00' },
        { number: '006', date: '2024-08-23', value: 'R$ 95,00' },
        { number: '007', date: '2024-08-22', value: 'R$ 300,00' },
        { number: '008', date: '2024-08-21', value: 'R$ 175,00' },
        { number: '009', date: '2024-08-20', value: 'R$ 130,00' },
        { number: '010', date: '2024-08-19', value: 'R$ 220,00' },
        { number: '011', date: '2024-08-18', value: 'R$ 160,00' },
        { number: '012', date: '2024-08-17', value: 'R$ 90,00' },
        { number: '013', date: '2024-08-16', value: 'R$ 110,00' },
        { number: '014', date: '2024-08-15', value: 'R$ 240,00' },
        { number: '015', date: '2024-08-14', value: 'R$ 85,00' },
    ];

    // Seleciona o contêiner onde as ordens serão inseridas
    const ordersGrid = document.querySelector('.orders-grid');

    // Cria e adiciona os elementos para cada ordem
    orders.forEach(order => {
        const orderItem = document.createElement('div');
        orderItem.className = 'order-item';
        orderItem.style.backgroundColor = getRandomColor(); // Define a cor de fundo aleatória
        orderItem.innerHTML = `
                <h2>Ordem #${order.number}</h2>
                <p>Data: ${order.date}</p>
                <p>Valor: ${order.value}</p>
            `;
        ordersGrid.appendChild(orderItem);
    });
</script>
</body>
</html>
